name: Sync to Gitee

on:
  push:
  workflow_dispatch:

concurrency:
  group: sync-to-gitee
  cancel-in-progress: false

jobs:
  mirror:
    name: Mirror GitHub repo to Gitee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Gitee token
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "Missing required secret: GITEE_TOKEN"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Gitee remote
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote remove gitee 2>/dev/null || true
          git remote add gitee "https://hgmzhn:${GITEE_TOKEN}@gitee.com/hgmzhn/manga-translator-ui.git"

      - name: Mirror to Gitee
        run: |
          git push --prune gitee \
            '+refs/remotes/origin/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'
